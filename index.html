<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>웹 명함 - E.LessYong</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    :root{
      --bg: #0b1020;
      --card: rgba(255,255,255,.08);
      --card-2: rgba(255,255,255,.12);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.68);
      --line: rgba(255,255,255,.18);

      --accent1: #7c3aed; /* purple */
      --accent2: #22c55e; /* green */
      --accent3: #38bdf8; /* sky */
      --shadow: 0 20px 60px rgba(0,0,0,.35);
    }

    *{ box-sizing: border-box; }
    body{
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 600px at 20% 10%, rgba(124,58,237,.35), transparent 60%),
        radial-gradient(900px 500px at 90% 30%, rgba(56,189,248,.25), transparent 55%),
        radial-gradient(900px 520px at 50% 95%, rgba(34,197,94,.20), transparent 60%),
        var(--bg);
      padding: 28px 16px;
    }

    .wrap{
      width: min(980px, 100%);
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    .card{
      position: relative;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.06));
      box-shadow: var(--shadow);
      border-radius: 22px;
      overflow: hidden;
      padding: 22px;
    }

    .card::before{
      content:"";
      position:absolute;
      inset:-2px;
      background:
        conic-gradient(from 180deg,
          rgba(124,58,237,.0) 0%,
          rgba(124,58,237,.35) 25%,
          rgba(56,189,248,.25) 55%,
          rgba(34,197,94,.25) 75%,
          rgba(124,58,237,.0) 100%);
      opacity: .55;
      filter: blur(18px);
      transform: translateY(-40px);
      pointer-events: none;
    }

    .content{
      position: relative;
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 18px;
      align-items: center;
    }

    @media (max-width: 720px){
      .content{
        grid-template-columns: 1fr;
        text-align: center;
      }
      .row{
        justify-content: center !important;
      }
    }

    .avatarBox{
      display: grid;
      place-items: center;
      padding: 14px 10px;
      border-radius: 18px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.14);
    }

    .avatar{
      width: 190px;
      height: 190px;
      display: block;
      filter: drop-shadow(0 16px 30px rgba(0,0,0,.35));
      object-fit: contain; /* 이미지 찌그러짐 방지 */
      object-position: center;
      border-radius: 18px;
    }

    /* 얼굴(캐릭터) 미세 애니메이션 */
    .floaty{
      transform-origin: center;
      animation: floaty 3.2s ease-in-out infinite;
    }
    @keyframes floaty{
      0%,100%{ transform: translateY(0); }
      50%{ transform: translateY(-6px); }
    }

    .meta{
      display: grid;
      gap: 10px;
      align-items: start;
    }

    .tagRow{
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .pill{
      display: inline-flex;
      gap: 8px;
      align-items: center;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(255,255,255,.07);
      color: var(--muted);
      font-size: 13px;
      user-select: none;
      backdrop-filter: blur(8px);
    }

    .dot{
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent3), var(--accent2));
      box-shadow: 0 0 0 4px rgba(56,189,248,.12);
    }

    h1{
      margin: 0;
      font-size: 34px;
      letter-spacing: -0.02em;
      line-height: 1.08;
    }

    .job{
      margin: 0;
      font-size: 16px;
      color: var(--muted);
    }

    .oneLine{
      margin: 0;
      font-size: 16px;
      color: rgba(255,255,255,.82);
      line-height: 1.45;
    }

    .divider{
      height: 1px;
      background: rgba(255,255,255,.14);
      margin: 6px 0 2px;
    }

    .contacts{
      display: grid;
      gap: 10px;
      margin-top: 6px;
    }

    .row{
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-start;
    }

    .btn{
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(255,255,255,.08);
      color: rgba(255,255,255,.9);
      border-radius: 14px;
      padding: 12px 14px;
      cursor: pointer;
      display: inline-flex;
      gap: 10px;
      align-items: center;
      user-select: none;
      transition: transform .12s ease, background .12s ease, border-color .12s ease, box-shadow .12s ease;
      font-size: 15px;
      min-width: 240px;
      justify-content: center;
    }

    .btn:active{ transform: scale(.99); }
    .btn:hover{
      background: rgba(255,255,255,.12);
      border-color: rgba(255,255,255,.22);
    }

    /* YouTube 브랜드(빨간색) */
    .btn.youtube{
      border-color: rgba(239,68,68,.40);
      background: rgba(239,68,68,.10);
    }
    .btn.youtube:hover{
      background: linear-gradient(135deg, rgba(239,68,68,.65) 0%, rgba(239,68,68,.18) 55%, rgba(244,63,94,.30) 100%);
      border-color: rgba(239,68,68,.85);
      box-shadow: 0 18px 50px rgba(239,68,68,.18);
    }

    .ico{
      width: 20px;
      height: 20px;
      opacity: .95;
      flex: 0 0 auto;
    }

    .hint{
      color: var(--muted);
      font-size: 12.5px;
      margin-top: 4px;
    }

    .toast{
      position: absolute;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      background: rgba(0,0,0,.55);
      border: 1px solid rgba(255,255,255,.16);
      color: rgba(255,255,255,.95);
      padding: 10px 14px;
      border-radius: 999px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease, transform .18s ease;
      backdrop-filter: blur(10px);
    }
    .toast.show{
      opacity: 1;
      transform: translateX(-50%) translateY(-4px);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card" aria-label="웹 명함">

        <div class="avatarBox">
          <!-- 참고 사진 얼굴 -->
          <img

                  <path d="m5.3 7.4 6.1 5c.35.29.85.29 1.2 0l6.1-5" stroke="rgba(255,255,255,.9)" stroke-width="1.7" stroke-linecap="round"/>

                <span id="phone">010-8992-2626</span>

              <a class="btn" href="https://blog.naver.com/hn-fan" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn 링크 열기">

                  <path d="M13.5 10.5a4 4 0 0 1 0 5.7l-1.2 1.2a4 4 0 1 1-5.7-5.7l1.2-1.2" stroke="rgba(255,255,255,.95)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span>LinkedIn</span>

              <a class="btn youtube" href="https://www.youtube.com/@FreeDDM" target="_blank" rel="noopener noreferrer" aria-label="유튜브 링크 열기">
                <svg class="ico" viewBox="0 0 24 24" fill="none" aria-hidden="true">

            <div class="hint">
              이메일/전화는 클릭하면 클립보드에 복사됩니다. LinkedIn/YouTube는 새 탭으로 열립니다.
            </div>
          </div>

          <div class="qrArea" aria-label="QR 코드 섹션">
            <div id="qrStatus" class="qrText">QR 생성 중...</div>
            <div id="qr"></div>
            <div class="qrText">스캔하면 연락처가 저장됩니다.</div>
          </div>
        </div>
      </div>

      <div class="toast" id="toast" role="status" aria-live="polite">복사됨</div>
    </section>
  </div>

  <script src="./qrcode.min.js" defer></script>
  <script src="script.js" defer></script>
</body>
</html>
